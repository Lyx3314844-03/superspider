server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location /public-benchmarks/ {
        try_files $uri $uri/ /public-benchmarks/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
