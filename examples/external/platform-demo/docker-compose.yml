services:
  suite-web:
    image: nginx:1.27-alpine
    container_name: spider-suite-web
    ports:
      - "8088:80"
    volumes:
      - ../../../web-ui:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gospider-api
      - pyspider-web
      - javaspider-web
      - rustspider-web

  redis:
    image: redis:7-alpine
    container_name: spider-suite-redis
    ports:
      - "6379:6379"

  gospider-api:
    build:
      context: ../../..
      dockerfile: examples/external/platform-demo/gospider-server.Dockerfile
    container_name: spider-suite-gospider
    ports:
      - "8080:8080"
    depends_on:
      - redis

  pyspider-web:
    build:
      context: ../../..
      dockerfile: examples/external/platform-demo/pyspider-web.Dockerfile
    container_name: spider-suite-pyspider
    ports:
      - "5000:5000"

  javaspider-web:
    build:
      context: ../../..
      dockerfile: examples/external/platform-demo/javaspider-web.Dockerfile
    container_name: spider-suite-javaspider
    ports:
      - "7070:7070"

  rustspider-web:
    build:
      context: ../../..
      dockerfile: examples/external/platform-demo/rustspider-web.Dockerfile
    container_name: spider-suite-rustspider
    ports:
      - "9090:9090"
