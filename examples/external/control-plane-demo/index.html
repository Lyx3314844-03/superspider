<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spider Control Plane Demo</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    input, button, textarea { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 10px; border-radius: 10px; border: 1px solid #475569; background: #0b1220; color: #e2e8f0; }
    button { cursor: pointer; background: #0284c7; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #334155; text-align: left; padding: 10px; }
    pre { white-space: pre-wrap; background: #020617; padding: 12px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Spider Control Plane Demo</h1>
      <p>Use this against any runtime exposing the shared <code>/api/tasks</code> contract.</p>
      <label>API Base URL</label>
      <input id="apiBase" value="http://localhost:5000/api/tasks">
      <label>Task Name</label>
      <input id="taskName" value="demo-task">
      <label>Target URL</label>
      <input id="taskUrl" value="https://example.com">
      <button onclick="createTask()">Create Task</button>
      <button onclick="refreshTasks()">Refresh Tasks</button>
    </div>

    <div class="card">
      <h2>Tasks</h2>
      <table>
        <thead><tr><th>ID</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tasks"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Result / Log Output</h2>
      <pre id="details">No task selected.</pre>
    </div>
  </div>

  <script>
    async function refreshTasks() {
      const base = document.getElementById('apiBase').value;
      const response = await fetch(base);
      const payload = await response.json();
      const tasks = payload.data || [];
      const tbody = document.getElementById('tasks');
      tbody.innerHTML = tasks.map(task => `
        <tr>
          <td>${task.id}</td>
          <td>${task.status || ''}</td>
          <td>
            <button onclick="startTask('${task.id}')">Start</button>
            <button onclick="stopTask('${task.id}')">Stop</button>
            <button onclick="loadDetails('${task.id}')">Inspect</button>
          </td>
        </tr>
      `).join('');
    }

    async function createTask() {
      const base = document.getElementById('apiBase').value;
      const payload = {
        name: document.getElementById('taskName').value,
        url: document.getElementById('taskUrl').value
      };
      await fetch(base, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      refreshTasks();
    }

    async function startTask(id) {
      const base = document.getElementById('apiBase').value;
      await fetch(`${base}/${id}/start`, {method: 'POST'});
      refreshTasks();
    }

    async function stopTask(id) {
      const base = document.getElementById('apiBase').value;
      await fetch(`${base}/${id}/stop`, {method: 'POST'});
      refreshTasks();
    }

    async function loadDetails(id) {
      const base = document.getElementById('apiBase').value;
      const [task, results, logs] = await Promise.all([
        fetch(`${base}/${id}`).then(r => r.json()),
        fetch(`${base}/${id}/results`).then(r => r.json()),
        fetch(`${base}/${id}/logs`).then(r => r.json())
      ]);
      document.getElementById('details').textContent = JSON.stringify({task, results, logs}, null, 2);
    }

    refreshTasks();
  </script>
</body>
</html>
