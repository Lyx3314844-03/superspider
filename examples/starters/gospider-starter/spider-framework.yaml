version: 1
project:
  name: gospider-starter
runtime: go
crawl:
  urls:
    - https://example.com
  concurrency: 4
  max_requests: 50
  max_depth: 1
  timeout_seconds: 20
browser:
  enabled: true
  headless: true
  timeout_seconds: 30
  user_agent: ""
  screenshot_path: artifacts/browser/page.png
  html_path: artifacts/browser/page.html
anti_bot:
  enabled: true
  profile: chrome-stealth
  proxy_pool: local
  session_mode: sticky
  stealth: true
  challenge_policy: browser
  captcha_provider: 2captcha
  captcha_api_key: ""
node_reverse:
  enabled: true
  base_url: http://localhost:3000
storage:
  checkpoint_dir: artifacts/checkpoints
  dataset_dir: artifacts/datasets
  export_dir: artifacts/exports
export:
  format: json
  output_path: artifacts/exports/results.json
