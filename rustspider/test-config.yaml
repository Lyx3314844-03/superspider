version: 1
project:
  name: rustspider-project
runtime: rust
crawl:
  urls:
  - https://example.com
  concurrency: 5
  max_requests: 100
  max_depth: 3
  timeout_seconds: 30
browser:
  enabled: true
  headless: true
  timeout_seconds: 30
  user_agent: ''
  screenshot_path: artifacts/browser/page.png
  html_path: artifacts/browser/page.html
storage:
  checkpoint_dir: artifacts/checkpoints
  dataset_dir: artifacts/datasets
  export_dir: artifacts/exports
export:
  format: json
  output_path: artifacts/exports/results.json
doctor:
  network_targets:
  - https://example.com
