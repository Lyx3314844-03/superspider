<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustSpider - 高性能爬虫控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        header h1 { color: #ffa500; display: flex; align-items: center; gap: 10px; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .metric {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffa500;
            margin: 10px 0;
        }
        .metric-label { color: #ccc; font-size: 14px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .panel h2 { color: #fff; margin-bottom: 15px; border-bottom: 2px solid #ffa500; padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 5px; color: #ccc; }
        .field input, .field select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }
        .field input::placeholder { color: #888; }
        .btn {
            background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        .btn:hover { opacity: 0.9; }
        .task {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #ffa500; color: #000; }
        .status-running { background: #4169e1; color: #fff; }
        .status-done { background: #32cd32; color: #000; }
        .bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .fill {
            height: 100%;
            background: linear-gradient(135deg, #ffa500 0%, #ff8c00 100%);
            transition: width 0.3s;
        }
        .console {
            background: #0d0d0d;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .line { margin-bottom: 5px; }
        .info { color: #00ff00; }
        .warn { color: #ffa500; }
        .err { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦀 RustSpider 控制台</h1>
        </header>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-label">总任务</div>
                <div class="metric-value" id="total">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">运行中</div>
                <div class="metric-value" id="running">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">已完成</div>
                <div class="metric-value" id="done">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">性能</div>
                <div class="metric-value" id="perf">0/s</div>
            </div>
        </div>
        
        <div class="grid">
            <div class="panel">
                <h2>▶ 创建任务</h2>
                <form id="form">
                    <div class="field">
                        <label>任务名</label>
                        <input type="text" id="name" required placeholder="crawler-1">
                    </div>
                    <div class="field">
                        <label>URL</label>
                        <input type="url" id="url" required placeholder="https://example.com">
                    </div>
                    <div class="field">
                        <label>模式</label>
                        <select id="mode">
                            <option value="http">HTTP</option>
                            <option value="browser">Browser</option>
                            <option value="distributed">Distributed</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>线程</label>
                        <input type="number" id="threads" value="50" min="1" max="500">
                    </div>
                    <button type="submit" class="btn">启动</button>
                </form>
            </div>
            
            <div class="panel">
                <h2>📋 任务列表</h2>
                <div id="list"></div>
            </div>
        </div>
        
        <div class="panel" style="margin-top:20px;">
            <h2>💻 控制台</h2>
            <div class="console" id="console">
                <div class="line info">[INFO] RustSpider 已就绪</div>
            </div>
        </div>
    </div>
    
    <script>
        const tasks = [];
        let id = 0;
        
        function log(m, l = 'info') {
            const c = document.getElementById('console');
            const e = document.createElement('div');
            e.className = `line ${l}`;
            e.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
            c.appendChild(e);
            c.scrollTop = c.scrollHeight;
        }
        
        document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            const t = {
                id: ++id,
                name: document.getElementById('name').value,
                url: document.getElementById('url').value,
                mode: document.getElementById('mode').value,
                threads: parseInt(document.getElementById('threads').value),
                status: 'pending',
                progress: 0
            };
            tasks.push(t);
            log(`[INFO] 任务 "${t.name}" 已创建`, 'info');
            render();
            update();
            
            setTimeout(() => {
                t.status = 'running';
                const i = setInterval(() => {
                    t.progress += Math.random() * 20;
                    if (t.progress >= 100) {
                        t.progress = 100;
                        t.status = 'done';
                        clearInterval(i);
                        log(`[INFO] 任务 "${t.name}" 完成`, 'info');
                    }
                    render();
                    update();
                }, 500);
            }, 300);
            
            e.target.reset();
        });
        
        function render() {
            document.getElementById('list').innerHTML = tasks.map(t => `
                <div class="task">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <strong>${t.name}</strong>
                        <span class="status status-${t.status}">${t.status}</span>
                    </div>
                    <small style="color:#888;">${t.url} | ${t.threads} threads</small>
                    <div class="bar">
                        <div class="fill" style="width:${Math.min(t.progress, 100)}%"></div>
                    </div>
                </div>
            `).join('');
        }
        
        function update() {
            document.getElementById('total').textContent = tasks.length;
            document.getElementById('running').textContent = tasks.filter(t => t.status === 'running').length;
            document.getElementById('done').textContent = tasks.filter(t => t.status === 'done').length;
            const d = tasks.filter(t => t.status === 'done').length;
            document.getElementById('perf').textContent = `${d}/s`;
        }
        
        update();
    </script>
</body>
</html>
