# Javaspider 配置文件

# 爬虫线程数
spider.threads=5

# 重试配置
spider.retry.times=3
spider.retry.sleep=1000

# 超时配置 (毫秒)
spider.timeout=30000

# 下载配置
download.dir=./downloads
download.max.count=10
download.overwrite=false

# 代理配置
proxy.enabled=false
proxy.host=
proxy.port=
proxy.username=
proxy.password=

# 浏览器配置 (Selenium)
browser.type=chrome
browser.headless=true
browser.pageLoadTimeout=30000

# Redis 配置 (分布式)
redis.host=localhost
redis.port=6379
redis.password=
redis.database=0

# 日志配置
log.level=INFO
log.file=./logs/spider.log

# API 配置
api.enabled=false
api.port=8080
api.host=0.0.0.0
