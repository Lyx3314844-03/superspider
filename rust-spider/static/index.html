<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustSpider - 可视化爬虫控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #1a202c;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header .logo {
            font-size: 36px;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .status-running {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-stopped {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #718096;
            font-size: 14px;
        }
        
        .metric-value {
            color: #1a202c;
            font-size: 20px;
            font-weight: 600;
        }
        
        .metric-value.success {
            color: #38a169;
        }
        
        .metric-value.error {
            color: #e53e3e;
        }
        
        .control-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }
        
        .control-panel h2 {
            color: #4a5568;
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c53030;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-bar {
            background: #e2e8f0;
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            margin-top: 12px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        
        .log-container {
            background: #1a202c;
            border-radius: 12px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .log-entry {
            color: #e2e8f0;
            padding: 4px 0;
            border-bottom: 1px solid #2d3748;
        }
        
        .log-entry.info {
            color: #63b3ed;
        }
        
        .log-entry.success {
            color: #68d391;
        }
        
        .log-entry.error {
            color: #fc8181;
        }
        
        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding-top: 20px;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.3s;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="logo">🕷️</span>
                RustSpider 控制台
            </h1>
            <span id="statusBadge" class="status-badge status-stopped">已停止</span>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📊 爬取统计</h2>
                <div class="metric">
                    <span class="metric-label">已爬取页面</span>
                    <span id="pagesCrawled" class="metric-value">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">成功</span>
                    <span id="pagesSuccess" class="metric-value success">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">失败</span>
                    <span id="pagesFailed" class="metric-value error">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">成功率</span>
                    <span id="successRate" class="metric-value">100%</span>
                </div>
            </div>
            
            <div class="card">
                <h2>⚡ 性能指标</h2>
                <div class="metric">
                    <span class="metric-label">平均响应时间</span>
                    <span id="avgResponseTime" class="metric-value">0ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">请求/秒</span>
                    <span id="requestsPerSecond" class="metric-value">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">总数据量</span>
                    <span id="totalBytes" class="metric-value">0 KB</span>
                </div>
                <div class="metric">
                    <span class="metric-label">运行时长</span>
                    <span id="duration" class="metric-value">0s</span>
                </div>
            </div>
            
            <div class="card">
                <h2>🔧 系统状态</h2>
                <div class="metric">
                    <span class="metric-label">队列大小</span>
                    <span id="queueSize" class="metric-value">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">活跃线程</span>
                    <span id="activeThreads" class="metric-value">0</span>
                </div>
                <div class="metric">
                    <span class="metric-label">健康状态</span>
                    <span id="healthStatus" class="metric-value success">Healthy</span>
                </div>
                <div class="metric">
                    <span class="metric-label">版本</span>
                    <span id="version" class="metric-value">2.0.0</span>
                </div>
            </div>
        </div>
        
        <div class="control-panel">
            <h2>🚀 爬虫配置</h2>
            <div class="form-group">
                <label>爬虫名称</label>
                <input type="text" id="spiderName" value="my_spider" placeholder="输入爬虫名称">
            </div>
            <div class="form-group">
                <label>起始 URL（每行一个）</label>
                <textarea id="startUrls" placeholder="https://example.com&#10;https://example.com/page2">https://www.example.com</textarea>
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                <div class="form-group">
                    <label>线程数</label>
                    <input type="number" id="threadCount" value="10" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>请求间隔 (ms)</label>
                    <input type="number" id="sleepTime" value="100" min="0">
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="startSpider()">
                    <span>▶️</span> 启动爬虫
                </button>
                <button class="btn btn-danger" onclick="stopSpider()" id="stopBtn" disabled>
                    <span>⏹️</span> 停止爬虫
                </button>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 实时图表</h2>
            <div class="chart-container" id="chartContainer">
                <!-- 动态生成的柱状图 -->
            </div>
        </div>
        
        <div class="card">
            <h2>📝 运行日志</h2>
            <div class="log-container" id="logContainer">
                <div class="log-entry info">[系统] 等待启动...</div>
            </div>
        </div>
    </div>
    
    <script>
        let isRunning = false;
        let updateInterval = null;
        
        // 初始化
        async function init() {
            await updateStatus();
            initChart();
        }
        
        // 更新状态
        async function updateStatus() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                if (data.success) {
                    updateMetrics(data.data);
                }
                
                const statusResponse = await fetch('/api/status');
                const statusData = await statusResponse.json();
                
                if (statusData.success) {
                    updateStatusUI(statusData.data);
                }
            } catch (error) {
                console.error('更新状态失败:', error);
            }
        }
        
        // 更新指标显示
        function updateMetrics(metrics) {
            document.getElementById('pagesCrawled').textContent = metrics.pages_crawled.toLocaleString();
            document.getElementById('pagesSuccess').textContent = metrics.pages_success.toLocaleString();
            document.getElementById('pagesFailed').textContent = metrics.pages_failed.toLocaleString();
            
            const successRate = metrics.pages_crawled > 0 
                ? ((metrics.pages_success / metrics.pages_crawled) * 100).toFixed(1)
                : 100;
            document.getElementById('successRate').textContent = successRate + '%';
            
            document.getElementById('avgResponseTime').textContent = metrics.avg_response_time_ms.toFixed(1) + 'ms';
            document.getElementById('requestsPerSecond').textContent = metrics.requests_per_second.toFixed(2);
            document.getElementById('totalBytes').textContent = (metrics.total_bytes / 1024).toFixed(2) + ' KB';
            document.getElementById('duration').textContent = metrics.duration_secs.toFixed(1) + 's';
            
            updateChart(metrics.pages_crawled);
        }
        
        // 更新状态 UI
        function updateStatusUI(status) {
            const badge = document.getElementById('statusBadge');
            const stopBtn = document.getElementById('stopBtn');
            
            if (status.status === 'running') {
                badge.textContent = '运行中';
                badge.className = 'status-badge status-running pulse';
                stopBtn.disabled = false;
                isRunning = true;
            } else {
                badge.textContent = '已停止';
                badge.className = 'status-badge status-stopped';
                stopBtn.disabled = true;
                isRunning = false;
            }
            
            document.getElementById('queueSize').textContent = status.queue_size.toLocaleString();
            document.getElementById('activeThreads').textContent = status.active_threads;
        }
        
        // 启动爬虫
        async function startSpider() {
            const config = {
                name: document.getElementById('spiderName').value,
                start_urls: document.getElementById('startUrls').value.split('\n').filter(u => u.trim()),
                thread_count: parseInt(document.getElementById('threadCount').value),
                sleep_time_ms: parseInt(document.getElementById('sleepTime').value),
            };
            
            try {
                // 保存配置
                await fetch('/api/spider/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config),
                });
                
                // 启动爬虫
                const response = await fetch('/api/spider/start', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    addLog('爬虫启动成功', 'success');
                    updateStatus();
                    
                    // 开始定时更新
                    if (updateInterval) clearInterval(updateInterval);
                    updateInterval = setInterval(updateStatus, 1000);
                } else {
                    addLog('启动失败：' + data.error, 'error');
                }
            } catch (error) {
                addLog('启动失败：' + error.message, 'error');
            }
        }
        
        // 停止爬虫
        async function stopSpider() {
            try {
                const response = await fetch('/api/spider/stop', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    addLog('爬虫已停止', 'info');
                    updateStatus();
                    
                    if (updateInterval) {
                        clearInterval(updateInterval);
                        updateInterval = null;
                    }
                } else {
                    addLog('停止失败：' + data.error, 'error');
                }
            } catch (error) {
                addLog('停止失败：' + error.message, 'error');
            }
        }
        
        // 添加日志
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        // 初始化图表
        function initChart() {
            const container = document.getElementById('chartContainer');
            for (let i = 0; i < 30; i++) {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = '4px';
                container.appendChild(bar);
            }
        }
        
        // 更新图表
        function updateChart(value) {
            const bars = document.querySelectorAll('.chart-bar');
            const normalized = Math.min(value / 100, 1);
            
            bars.forEach((bar, i) => {
                const height = Math.max(4, normalized * 180 * (0.3 + Math.random() * 0.7));
                bar.style.height = height + 'px';
            });
        }
        
        // 页面加载后初始化
        init();
    </script>
</body>
</html>
