name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  os-support:
    name: Verify Windows Linux macOS Support
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyspider/requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: gospider/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare artifact directory
        shell: bash
        run: |
          mkdir -p artifacts

      - name: Install PySpider dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r pyspider/requirements.txt
          pip install -e "./pyspider[dev]"

      - name: Run cross-platform doctor surface
        shell: bash
        run: |
          python verify_env.py --json 2>&1 | tee artifacts/verify-env-${{ matrix.os }}.json

      - name: Run cross-platform smoke surface
        shell: bash
        run: |
          python smoke_test.py --json 2>&1 | tee artifacts/smoke-test-${{ matrix.os }}.json

      - name: Run cross-platform operating system support gate
        shell: bash
        run: |
          python verify_operating_system_support.py --json --markdown-out artifacts/operating-system-support.md 2>&1 | tee artifacts/operating-system-support-${{ matrix.os }}.json

      - name: Upload OS support artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-support-${{ matrix.os }}
          path: |
            artifacts/verify-env-${{ matrix.os }}.json
            artifacts/smoke-test-${{ matrix.os }}.json
            artifacts/operating-system-support-${{ matrix.os }}.json

  release:
    name: Validate And Release
    runs-on: ubuntu-latest
    needs:
      - os-support
    env:
      PYTHONUNBUFFERED: '1'
      SUPERSPIDER_POSTGRES_DSN: postgresql://superspider:superspider@127.0.0.1:5432/superspider
      SUPERSPIDER_POSTGRES_TABLE_PREFIX: spider_release_cp
      SUPERSPIDER_ROOT: ${{ github.workspace }}/superspider
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: superspider
          POSTGRES_USER: superspider
          POSTGRES_PASSWORD: superspider
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U superspider -d superspider"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout superspider control-plane repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.SUPERSPIDER_REPOSITORY || format('{0}/superspider', github.repository_owner) }}
          path: superspider

      - name: Download OS support artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: os-support-*
          path: artifacts/os-support-artifacts
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyspider/requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: gospider/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Add Chrome to PATH
        shell: bash
        run: |
          echo "$(dirname '${{ steps.setup-chrome.outputs.chrome-path }}')" >> "$GITHUB_PATH"

      - name: Install FFmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Prepare release directories
        shell: bash
        run: |
          mkdir -p artifacts
          mkdir -p downloads
          mkdir -p gospider/outputs gospider/artifacts gospider/downloads gospider/media
          mkdir -p pyspider/artifacts
          mkdir -p javaspider/artifacts
          mkdir -p rustspider/artifacts

      - name: Install PySpider dependencies
        shell: bash
        run: |
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee artifacts/release-pip-upgrade.log
          python -m pip install "psycopg[binary]" 2>&1 | tee artifacts/release-pg-driver-install.log
          pip install -r pyspider/requirements.txt 2>&1 | tee artifacts/release-pip-install.log
          pip install -e "./pyspider[dev]" 2>&1 | tee artifacts/release-pip-install-dev.log

      - name: Verify shared CLI contract
        shell: bash
        run: |
          set -o pipefail
          cd gospider
          go run ./cmd/gospider config init --output artifacts/go-contract.yaml
          go run ./cmd/gospider doctor --config artifacts/go-contract.yaml --json | tee ../artifacts/go-contract.json
          cd ../javaspider
          chmod +x run-framework.sh
          ./run-framework.sh config init --output artifacts/java-contract.yaml
          ./run-framework.sh doctor --config artifacts/java-contract.yaml --json | tee ../artifacts/java-contract.json
          cd ../rustspider
          cargo run -- config init --output artifacts/rust-contract.yaml
          cargo run -- doctor --config artifacts/rust-contract.yaml --json | tee ../artifacts/rust-contract.json
          cd ..
          pyspider config init --output pyspider/artifacts/py-contract.yaml
          pyspider doctor --config pyspider/artifacts/py-contract.yaml --json | tee artifacts/py-contract.json

      - name: Validate generated contract configs
        shell: bash
        run: |
          set -o pipefail
          python validate_contract_configs.py --json \
            --config java=artifacts/java-contract.yaml \
            --config go=artifacts/go-contract.yaml \
            --config rust=artifacts/rust-contract.yaml \
            --config python=pyspider/artifacts/py-contract.yaml 2>&1 | tee artifacts/contract-config-validation.json

      - name: Run root tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests -p no:cacheprovider 2>&1 | tee artifacts/root-tests.log

      - name: Run aggregate verify_env
        shell: bash
        run: |
          set -o pipefail
          python verify_env.py --json 2>&1 | tee artifacts/verify-env.json

      - name: Run root version check
        shell: bash
        run: |
          set -o pipefail
          python verify_version.py --json 2>&1 | tee artifacts/verify-version.json

      - name: Run root smoke test
        shell: bash
        run: |
          set -o pipefail
          python smoke_test.py --json 2>&1 | tee artifacts/smoke-test.json

      - name: Run runtime readiness verify
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_readiness.py --json 2>&1 | tee artifacts/runtime-readiness.json

      - name: Run runtime stability verify
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_stability.py --json --markdown-out artifacts/runtime-stability.md 2>&1 | tee artifacts/runtime-stability.json

      - name: Run result contracts verify
        shell: bash
        run: |
          set -o pipefail
          python verify_result_contracts.py --json --markdown-out artifacts/result-contracts.md 2>&1 | tee artifacts/result-contracts.json

      - name: Run runtime stability trend verify
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_stability_trends.py --json --markdown-out artifacts/runtime-stability-trends.md 2>&1 | tee artifacts/runtime-stability-trends.json

      - name: Run legacy surfaces verify
        shell: bash
        run: |
          set -o pipefail
          python verify_legacy_surfaces.py --json 2>&1 | tee artifacts/legacy-surfaces.json

      - name: Run runtime core capabilities verify
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_core_capabilities.py --json 2>&1 | tee artifacts/runtime-core-capabilities.json

      - name: Run superspider control-plane verify
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane.py --json --markdown-out artifacts/superspider-control-plane.md 2>&1 | tee artifacts/superspider-control-plane.json

      - name: Run superspider control-plane benchmark verify
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane_benchmark.py --json 2>&1 | tee artifacts/superspider-control-plane-benchmark.json

      - name: Run superspider control-plane install smoke verify
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane_install_smoke.py --json 2>&1 | tee artifacts/superspider-control-plane-install-smoke.json

      - name: Run superspider control-plane release verify
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane_release.py --json 2>&1 | tee artifacts/superspider-control-plane-release.json

      - name: Run superspider control-plane package verify
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane_package.py --json 2>&1 | tee artifacts/superspider-control-plane-package.json

      - name: Run superspider control-plane postgres backend verify
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane_postgres_backend.py --json 2>&1 | tee artifacts/superspider-control-plane-postgres-backend.json

      - name: Stage superspider control-plane dist artifacts
        shell: bash
        run: |
          set -o pipefail
          SUPERSPIDER_ROOT="${SUPERSPIDER_ROOT:-../superspider}"
          mkdir -p artifacts/superspider-control-plane-dist
          cp -R "${SUPERSPIDER_ROOT}/dist/." artifacts/superspider-control-plane-dist/
          find artifacts/superspider-control-plane-dist -maxdepth 1 -type f -printf '%f\n' | sort > artifacts/superspider-control-plane-dist.index.txt

      - name: Run operator products verify
        shell: bash
        run: |
          set -o pipefail
          python verify_operator_products.py --json --markdown-out artifacts/operator-products.md 2>&1 | tee artifacts/operator-products.json

      - name: Run operating system support verify
        shell: bash
        run: |
          set -o pipefail
          python verify_operating_system_support.py --json --markdown-out artifacts/operating-system-support.md 2>&1 | tee artifacts/operating-system-support.json

      - name: Run kernel homogeneity verify
        shell: bash
        run: |
          set -o pipefail
          python verify_kernel_homogeneity.py --json --markdown-out artifacts/kernel-homogeneity.md 2>&1 | tee artifacts/kernel-homogeneity.json

      - name: Run observability evidence verify
        shell: bash
        run: |
          set -o pipefail
          python verify_observability_evidence.py --json --markdown-out artifacts/observability-evidence.md 2>&1 | tee artifacts/observability-evidence.json

      - name: Run cache and incremental evidence verify
        shell: bash
        run: |
          set -o pipefail
          python verify_cache_incremental_evidence.py --json --markdown-out artifacts/cache-incremental-evidence.md 2>&1 | tee artifacts/cache-incremental-evidence.json

      - name: Run maturity governance verify
        shell: bash
        run: |
          set -o pipefail
          python verify_maturity_governance.py --json 2>&1 | tee artifacts/maturity-governance.json

      - name: Run ecosystem readiness verify
        shell: bash
        run: |
          set -o pipefail
          python verify_ecosystem_readiness.py --json --markdown-out artifacts/ecosystem-readiness.md 2>&1 | tee artifacts/ecosystem-readiness.json

      - name: Run ecosystem marketplace verify
        shell: bash
        run: |
          set -o pipefail
          python verify_ecosystem_marketplace.py --json --markdown-out artifacts/ecosystem-marketplace.md 2>&1 | tee artifacts/ecosystem-marketplace.json

      - name: Run industry proof surface verify
        shell: bash
        run: |
          set -o pipefail
          python verify_industry_proof_surface.py --json --markdown-out artifacts/industry-proof-surface.md 2>&1 | tee artifacts/industry-proof-surface.json

      - name: Validate anti-bot replay corpus
        shell: bash
        run: |
          set -o pipefail
          python validate_antibot_replays.py --json 2>&1 | tee artifacts/antibot-replays.json

      - name: Validate workflow replay corpus
        shell: bash
        run: |
          set -o pipefail
          python validate_workflow_replays.py --json 2>&1 | tee artifacts/workflow-replays.json

      - name: Build JavaSpider captcha summary
        shell: bash
        run: |
          set -o pipefail
          python verify_javaspider_captcha_summary.py --json 2>&1 | tee artifacts/javaspider-captcha-summary.json

      - name: Build captcha live readiness summary
        shell: bash
        run: |
          set -o pipefail
          python verify_captcha_live_readiness.py --json --markdown-out artifacts/captcha-live-readiness.md 2>&1 | tee artifacts/captcha-live-readiness.json

      - name: Build PySpider concurrency summary
        shell: bash
        run: |
          set -o pipefail
          python verify_pyspider_concurrency_summary.py --json 2>&1 | tee artifacts/pyspider-concurrency-summary.json

      - name: Build Rust browser summary
        shell: bash
        run: |
          set -o pipefail
          python verify_rust_browser_summary.py --json 2>&1 | tee artifacts/rust-browser-summary.json

      - name: Build replay dashboard
        shell: bash
        run: |
          set -o pipefail
          python verify_replay_dashboard.py --json 2>&1 | tee artifacts/replay-dashboard.json

      - name: Build replay trend report
        shell: bash
        run: |
          set -o pipefail
          python verify_replay_trends.py --json --snapshot-out artifacts/replay-history/current-dashboard.json 2>&1 | tee artifacts/replay-trends.json

      - name: Build GoSpider distributed summary
        shell: bash
        run: |
          set -o pipefail
          python verify_gospider_distributed_summary.py --json 2>&1 | tee artifacts/gospider-distributed-summary.json

      - name: Build Rust distributed summary
        shell: bash
        run: |
          set -o pipefail
          python verify_rust_distributed_summary.py --json 2>&1 | tee artifacts/rust-distributed-summary.json

      - name: Build Rust preflight summary
        shell: bash
        run: |
          set -o pipefail
          python verify_rust_preflight_summary.py --json 2>&1 | tee artifacts/rust-preflight-summary.json

      - name: Verify quality policy governance
        shell: bash
        run: |
          set -o pipefail
          python verify_quality_policy_governance.py --json 2>&1 | tee artifacts/quality-policy-governance.json

      - name: Build framework scorecard
        shell: bash
        run: |
          set -o pipefail
          python generate_framework_scorecard.py --json --markdown-out artifacts/framework-scorecard.md 2>&1 | tee artifacts/framework-scorecard.json

      - name: Build framework deep surfaces report
        shell: bash
        run: |
          set -o pipefail
          python generate_framework_deep_surfaces_report.py --json --markdown-out artifacts/framework-deep-surfaces.md 2>&1 | tee artifacts/framework-deep-surfaces.json

      - name: Build benchmark and SLA report
        shell: bash
        run: |
          set -o pipefail
          python verify_benchmark_sla.py --json --markdown-out artifacts/benchmark-sla.md 2>&1 | tee artifacts/benchmark-sla.json

      - name: Build blackbox e2e report
        shell: bash
        run: |
          set -o pipefail
          python verify_blackbox_e2e.py --json --markdown-out artifacts/blackbox-e2e.md 2>&1 | tee artifacts/blackbox-e2e.json

      - name: Verify framework standards matrix
        shell: bash
        run: |
          set -o pipefail
          python verify_framework_standards.py --json --markdown-out artifacts/framework-standards.md 2>&1 | tee artifacts/framework-standards.json

      - name: Run quality thresholds
        shell: bash
        run: |
          set -o pipefail
          python verify_quality_thresholds.py --json --profile strict --markdown-out artifacts/quality-thresholds.md 2>&1 | tee artifacts/quality-thresholds.json

      - name: Build quality events
        shell: bash
        run: |
          set -o pipefail
          python verify_quality_events.py --json --snapshot-out artifacts/quality-events-history/current-events.json --compact-out artifacts/quality-events.compact.json --ndjson-out artifacts/quality-events.ndjson 2>&1 | tee artifacts/quality-events.json

      - name: Build release baseline bundle
        shell: bash
        run: |
          set -o pipefail
          python generate_baseline_bundle.py --json --quality-profile strict --markdown-out artifacts/baseline-bundle.md 2>&1 | tee artifacts/baseline-bundle.json

      - name: Build unified framework completion report
        shell: bash
        run: |
          set -o pipefail
          python generate_framework_completion_report.py --json --markdown-out CURRENT_FRAMEWORK_COMPLETION_REPORT.md 2>&1 | tee artifacts/framework-completion-report.json

      - name: Run local integrations report
        shell: bash
        run: |
          set -o pipefail
          python verify_local_integrations.py --json --markdown-out LOCAL_INTEGRATIONS_REPORT.md 2>&1 | tee artifacts/local-integrations.json

      - name: Run media blackbox report
        shell: bash
        run: |
          set -o pipefail
          python verify_media_blackbox.py --json --markdown-out MEDIA_BLACKBOX_REPORT.md 2>&1 | tee artifacts/media-blackbox.json

      - name: Run release readiness gate
        shell: bash
        run: |
          set -o pipefail
          python verify_release_ready.py --json --markdown-out RELEASE_READINESS_REPORT.md 2>&1 | tee artifacts/release-readiness.json

      - name: Generate GitHub release body
        shell: bash
        run: |
          set -o pipefail
          python generate_github_release_body.py --output GITHUB_RELEASE_BODY_${{ github.ref_name }}.md --json 2>&1 | tee artifacts/github-release-body.json

      - name: Run JavaSpider verify
        shell: bash
        working-directory: javaspider
        run: |
          set -o pipefail
          mvn -q verify 2>&1 | tee artifacts/mvn-verify.log

      - name: Run PySpider tests with coverage
        shell: bash
        working-directory: pyspider
        run: |
          set -o pipefail
          python -m pytest --cov=pyspider --cov-report=xml --cov-report=term-missing 2>&1 | tee artifacts/pytest.log

      - name: Run GoSpider tests
        shell: bash
        working-directory: gospider
        run: |
          set -o pipefail
          go test ./... 2>&1 | tee artifacts/go-test.log

      - name: Run RustSpider tests
        shell: bash
        working-directory: rustspider
        run: |
          set -o pipefail
          cargo test 2>&1 | tee artifacts/cargo-test.log

      - name: Run RustSpider distributed feature gate
        shell: bash
        working-directory: rustspider
        run: |
          set -o pipefail
          cargo test --features distributed --test distributed_scorecard 2>&1 | tee artifacts/cargo-distributed.log

      - name: Run RustSpider distributed behavior scorecard
        shell: bash
        working-directory: rustspider
        run: |
          set -o pipefail
          cargo test --test distributed_behavior_scorecard 2>&1 | tee artifacts/cargo-distributed-behavior.log

      - name: Run RustSpider fmt check
        shell: bash
        working-directory: rustspider
        run: |
          set -o pipefail
          cargo fmt --check 2>&1 | tee artifacts/cargo-fmt.log

      - name: Run RustSpider clippy
        shell: bash
        working-directory: rustspider
        run: |
          set -o pipefail
          cargo clippy --all-targets -- -D warnings 2>&1 | tee artifacts/cargo-clippy.log

      - name: Generate release summary
        shell: bash
        run: |
          cat <<'EOF' > artifacts/release-summary.md
          # Release Validation Summary

          - Ref: ${{ github.ref }}
          - Commit: ${{ github.sha }}
          - Workflow: ${{ github.workflow }}
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Gates

          - Root pytest suite
          - Aggregate environment verification
          - Root version consistency check
          - Root smoke tests
          - Runtime readiness synthetic baseline
          - Runtime stability synthetic baseline
          - Runtime stability trend gate
          - Shared superspider control-plane parity gate
          - Superspider control-plane benchmark gate
          - Superspider control-plane install smoke gate
          - Superspider control-plane package gate
          - Superspider control-plane Postgres backend gate
          - Superspider control-plane release gate
          - Legacy surface isolation gate
          - Windows/Linux/macOS support gate
          - Anti-bot replay corpus validation
          - Workflow/browser replay validation
          - Replay dashboard aggregation
          - Replay trend reporting
          - Maturity governance verification
          - Rust distributed summary
          - Rust preflight summary
          - Quality policy governance
          - Framework scorecard generation
          - Benchmark and SLA verification
          - Cross-framework blackbox e2e verification
          - Quality threshold gate
          - Quality event stream
          - Release baseline bundle
          - Unified framework completion report
          - Local integrations report
          - Media blackbox report
          - Release readiness gate
          - Generated GitHub release body
          - Shared CLI contract config/doctor checks
          - Shared contract config validation
          - JavaSpider Maven verify gate
          - PySpider pytest suite with coverage
          - GoSpider test suite
          - RustSpider cargo test suite
          - RustSpider distributed feature gate
          - RustSpider distributed behavior scorecard
          - RustSpider cargo fmt check
          - RustSpider cargo clippy gate

          ## Artifacts

          - artifacts/root-tests.log
          - artifacts/verify-env.json
          - artifacts/verify-version.json
          - artifacts/smoke-test.json
          - artifacts/runtime-readiness.json
          - artifacts/runtime-stability.json
          - artifacts/runtime-stability.md
          - artifacts/runtime-stability-trends.json
          - artifacts/runtime-stability-trends.md
          - artifacts/superspider-control-plane.json
          - artifacts/superspider-control-plane.md
          - artifacts/superspider-control-plane-benchmark.json
          - artifacts/superspider-control-plane-install-smoke.json
          - artifacts/superspider-control-plane-package.json
          - artifacts/superspider-control-plane-postgres-backend.json
          - artifacts/superspider-control-plane-release.json
          - artifacts/superspider-control-plane-dist.index.txt
          - artifacts/superspider-control-plane-dist/
          - artifacts/superspider-control-plane-dist/SHA256SUMS.txt
          - artifacts/superspider-control-plane-dist/dist-manifest.json
          - artifacts/legacy-surfaces.json
          - artifacts/operating-system-support.json
          - artifacts/operating-system-support.md
          - artifacts/maturity-governance.json
          - artifacts/antibot-replays.json
          - artifacts/workflow-replays.json
          - artifacts/replay-dashboard.json
          - artifacts/replay-trends.json
          - artifacts/captcha-live-readiness.json
          - artifacts/captcha-live-readiness.md
          - artifacts/rust-distributed-summary.json
          - artifacts/rust-preflight-summary.json
          - artifacts/quality-policy-governance.json
          - artifacts/framework-scorecard.json
          - artifacts/framework-scorecard.md
          - artifacts/framework-deep-surfaces.json
          - artifacts/framework-deep-surfaces.md
          - artifacts/benchmark-sla.json
          - artifacts/benchmark-sla.md
          - artifacts/blackbox-e2e.json
          - artifacts/blackbox-e2e.md
          - artifacts/quality-thresholds.json
          - artifacts/quality-thresholds.md
          - artifacts/quality-events.json
          - artifacts/quality-events.compact.json
          - artifacts/quality-events.ndjson
          - artifacts/quality-events-history/current-events.json
          - artifacts/baseline-bundle.json
          - artifacts/baseline-bundle.md
          - artifacts/framework-completion-report.json
          - CURRENT_FRAMEWORK_COMPLETION_REPORT.md
          - artifacts/local-integrations.json
          - LOCAL_INTEGRATIONS_REPORT.md
          - artifacts/media-blackbox.json
          - MEDIA_BLACKBOX_REPORT.md
          - artifacts/release-readiness.json
          - RELEASE_READINESS_REPORT.md
          - artifacts/github-release-body.json
          - GITHUB_RELEASE_BODY_${{ github.ref_name }}.md
          - artifacts/replay-history/current-dashboard.json
          - artifacts/release-pip-install-dev.log
          - artifacts/go-contract.json
          - artifacts/java-contract.json
          - artifacts/rust-contract.json
          - artifacts/py-contract.json
          - artifacts/contract-config-validation.json
          - javaspider/artifacts/mvn-verify.log
          - pyspider/artifacts/pytest.log
          - pyspider/coverage.xml
          - gospider/artifacts/go-test.log
          - rustspider/artifacts/cargo-test.log
          - rustspider/artifacts/cargo-distributed.log
          - rustspider/artifacts/cargo-distributed-behavior.log
          - rustspider/artifacts/cargo-fmt.log
          - rustspider/artifacts/cargo-clippy.log
          EOF

      - name: Upload release validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation
          path: |
            artifacts/release-summary.md
            artifacts/root-tests.log
            artifacts/verify-env.json
            artifacts/verify-version.json
            artifacts/smoke-test.json
            artifacts/runtime-readiness.json
            artifacts/runtime-stability.json
            artifacts/runtime-stability.md
            artifacts/runtime-stability-trends.json
