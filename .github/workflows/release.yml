      - name: Upload superspider control-plane dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: superspider-control-plane-dist
          path: |
            artifacts/superspider-control-plane-dist
            artifacts/superspider-control-plane-dist.index.txt

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          NOTES_FILE="artifacts/release-summary.md"
          VERSIONED_NOTES="GITHUB_RELEASE_BODY_${{ github.ref_name }}.md"
          if [ -f "${VERSIONED_NOTES}" ]; then
            NOTES_FILE="${VERSIONED_NOTES}"
          elif [ -f "GITHUB_RELEASE_BODY_v1.0.0.md" ]; then
            NOTES_FILE="GITHUB_RELEASE_BODY_v1.0.0.md"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "${NOTES_FILE}"
