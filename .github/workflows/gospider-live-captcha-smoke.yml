name: GoSpider Live Captcha Smoke

on:
  workflow_dispatch:

jobs:
  live-captcha-smoke:
    runs-on: ubuntu-latest

    env:
      GOSPIDER_LIVE_CAPTCHA_SMOKE: "1"
      TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
      CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
      ANTI_CAPTCHA_API_KEY: ${{ secrets.ANTI_CAPTCHA_API_KEY }}
      GOSPIDER_LIVE_RECAPTCHA_SITE_KEY: ${{ secrets.GOSPIDER_LIVE_RECAPTCHA_SITE_KEY }}
      GOSPIDER_LIVE_RECAPTCHA_PAGE_URL: ${{ secrets.GOSPIDER_LIVE_RECAPTCHA_PAGE_URL }}
      GOSPIDER_LIVE_HCAPTCHA_SITE_KEY: ${{ secrets.GOSPIDER_LIVE_HCAPTCHA_SITE_KEY }}
      GOSPIDER_LIVE_HCAPTCHA_PAGE_URL: ${{ secrets.GOSPIDER_LIVE_HCAPTCHA_PAGE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gospider/go.sum

      - name: Show live captcha configuration summary
        shell: bash
        run: |
          if [ -n "${TWO_CAPTCHA_API_KEY}" ] || [ -n "${CAPTCHA_API_KEY}" ]; then echo "two_captcha_key_set=yes"; else echo "two_captcha_key_set=no"; fi
          if [ -n "${ANTI_CAPTCHA_API_KEY}" ]; then echo "anti_captcha_key_set=yes"; else echo "anti_captcha_key_set=no"; fi
          if [ -n "${GOSPIDER_LIVE_RECAPTCHA_SITE_KEY}" ] && [ -n "${GOSPIDER_LIVE_RECAPTCHA_PAGE_URL}" ]; then echo "recaptcha_target_set=yes"; else echo "recaptcha_target_set=no"; fi
          if [ -n "${GOSPIDER_LIVE_HCAPTCHA_SITE_KEY}" ] && [ -n "${GOSPIDER_LIVE_HCAPTCHA_PAGE_URL}" ]; then echo "hcaptcha_target_set=yes"; else echo "hcaptcha_target_set=no"; fi

      - name: Run GoSpider live captcha verify
        shell: bash
        run: |
          mkdir -p artifacts
          python verify_gospider_captcha_live.py --json | tee artifacts/gospider-captcha-live.json

      - name: Upload live captcha report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gospider-live-captcha-report
          path: artifacts/gospider-captcha-live.json
