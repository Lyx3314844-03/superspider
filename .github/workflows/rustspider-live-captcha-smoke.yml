name: RustSpider Live Captcha Smoke

on:
  workflow_dispatch:

jobs:
  live-captcha-smoke:
    runs-on: ubuntu-latest

    env:
      RUSTSPIDER_LIVE_CAPTCHA_SMOKE: "1"
      TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
      CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
      ANTI_CAPTCHA_API_KEY: ${{ secrets.ANTI_CAPTCHA_API_KEY }}
      RUSTSPIDER_LIVE_RECAPTCHA_SITE_KEY: ${{ secrets.RUSTSPIDER_LIVE_RECAPTCHA_SITE_KEY }}
      RUSTSPIDER_LIVE_RECAPTCHA_PAGE_URL: ${{ secrets.RUSTSPIDER_LIVE_RECAPTCHA_PAGE_URL }}
      RUSTSPIDER_LIVE_HCAPTCHA_SITE_KEY: ${{ secrets.RUSTSPIDER_LIVE_HCAPTCHA_SITE_KEY }}
      RUSTSPIDER_LIVE_HCAPTCHA_PAGE_URL: ${{ secrets.RUSTSPIDER_LIVE_HCAPTCHA_PAGE_URL }}
      RUSTSPIDER_LIVE_TURNSTILE_SITE_KEY: ${{ secrets.RUSTSPIDER_LIVE_TURNSTILE_SITE_KEY }}
      RUSTSPIDER_LIVE_TURNSTILE_PAGE_URL: ${{ secrets.RUSTSPIDER_LIVE_TURNSTILE_PAGE_URL }}
      RUSTSPIDER_LIVE_TURNSTILE_ACTION: ${{ secrets.RUSTSPIDER_LIVE_TURNSTILE_ACTION }}
      RUSTSPIDER_LIVE_TURNSTILE_CDATA: ${{ secrets.RUSTSPIDER_LIVE_TURNSTILE_CDATA }}
      RUSTSPIDER_LIVE_TURNSTILE_PAGEDATA: ${{ secrets.RUSTSPIDER_LIVE_TURNSTILE_PAGEDATA }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show live captcha configuration summary
        shell: bash
        run: |
          if [ -n "${TWO_CAPTCHA_API_KEY}" ] || [ -n "${CAPTCHA_API_KEY}" ]; then echo "two_captcha_key_set=yes"; else echo "two_captcha_key_set=no"; fi
          if [ -n "${ANTI_CAPTCHA_API_KEY}" ]; then echo "anti_captcha_key_set=yes"; else echo "anti_captcha_key_set=no"; fi
          if [ -n "${RUSTSPIDER_LIVE_RECAPTCHA_SITE_KEY}" ] && [ -n "${RUSTSPIDER_LIVE_RECAPTCHA_PAGE_URL}" ]; then echo "recaptcha_target_set=yes"; else echo "recaptcha_target_set=no"; fi
          if [ -n "${RUSTSPIDER_LIVE_HCAPTCHA_SITE_KEY}" ] && [ -n "${RUSTSPIDER_LIVE_HCAPTCHA_PAGE_URL}" ]; then echo "hcaptcha_target_set=yes"; else echo "hcaptcha_target_set=no"; fi
          if [ -n "${RUSTSPIDER_LIVE_TURNSTILE_SITE_KEY}" ] && [ -n "${RUSTSPIDER_LIVE_TURNSTILE_PAGE_URL}" ]; then echo "turnstile_target_set=yes"; else echo "turnstile_target_set=no"; fi

      - name: Run RustSpider live captcha verify
        shell: bash
        run: |
          mkdir -p artifacts
          python verify_rust_captcha_live.py --json | tee artifacts/rust-captcha-live.json

      - name: Upload live captcha report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustspider-live-captcha-report
          path: artifacts/rust-captcha-live.json
