name: Public Suite Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: public-suite-pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Build And Deploy Public Suite Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyspider/requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r pyspider/requirements.txt

      - name: Prepare web output directories
        shell: bash
        run: |
          mkdir -p artifacts
          mkdir -p artifacts/benchmark-history
          mkdir -p web-ui/public-benchmarks

      - name: Build public benchmark reports
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_readiness.py --json 2>&1 | tee artifacts/runtime-readiness.json
          python generate_framework_scorecard.py --json --markdown-out artifacts/framework-scorecard.md 2>&1 | tee artifacts/framework-scorecard.json
          python generate_framework_deep_surfaces_report.py --json --markdown-out artifacts/framework-deep-surfaces.md 2>&1 | tee artifacts/framework-deep-surfaces.json
          python verify_benchmark_sla.py --json --markdown-out artifacts/benchmark-sla.md 2>&1 | tee artifacts/benchmark-sla.json
          python verify_blackbox_e2e.py --json --markdown-out artifacts/blackbox-e2e.md 2>&1 | tee artifacts/blackbox-e2e.json
          python verify_benchmark_trends.py --json --markdown-out artifacts/benchmark-trends.md --snapshot-out artifacts/benchmark-history/current-benchmark.json 2>&1 | tee artifacts/benchmark-trends.json

      - name: Generate public benchmark site
        shell: bash
        run: |
          python generate_public_benchmark_site.py --output web-ui/public-benchmarks/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-ui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
