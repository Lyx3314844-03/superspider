name: Nightly Scale

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  nightly-scale:
    name: Build Nightly Scale Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyspider/requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: gospider/go.sum

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r pyspider/requirements.txt

      - name: Prepare scale artifact directories
        shell: bash
        run: |
          mkdir -p artifacts
          mkdir -p artifacts/benchmark-history
          mkdir -p artifacts/scale-history
          mkdir -p artifacts/stability-history

      - name: Run GoSpider synthetic soak test
        shell: bash
        working-directory: gospider
        run: |
          set -o pipefail
          go test ./distributed -run TestRunSyntheticSoakProducesStableReport -v 2>&1 | tee ../artifacts/gospider-soak.log

      - name: Build benchmark SLA report
        shell: bash
        run: |
          set -o pipefail
          python verify_benchmark_sla.py --json --markdown-out artifacts/benchmark-sla.md 2>&1 | tee artifacts/benchmark-sla.json

      - name: Build blackbox e2e report
        shell: bash
        run: |
          set -o pipefail
          python verify_blackbox_e2e.py --json --markdown-out artifacts/blackbox-e2e.md 2>&1 | tee artifacts/blackbox-e2e.json

      - name: Build runtime stability report
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_stability.py --json --markdown-out artifacts/runtime-stability.md 2>&1 | tee artifacts/runtime-stability.json

      - name: Build runtime stability trend report
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_stability_trends.py \
            --json \
            --markdown-out artifacts/runtime-stability-trends.md \
            --snapshot-out artifacts/stability-history/current-runtime-stability.json \
            2>&1 | tee artifacts/runtime-stability-trends.json

      - name: Build superspider control-plane report
        shell: bash
        run: |
          set -o pipefail
          python verify_superspider_control_plane.py \
            --json \
            --markdown-out artifacts/superspider-control-plane.md \
            2>&1 | tee artifacts/superspider-control-plane.json

      - name: Build benchmark trend report
        shell: bash
        run: |
          set -o pipefail
          python verify_benchmark_trends.py \
            --json \
            --markdown-out artifacts/benchmark-trends.md \
            --snapshot-out artifacts/benchmark-history/current-benchmark.json \
            2>&1 | tee artifacts/benchmark-trends.json

      - name: Snapshot nightly history
        shell: bash
        run: |
          cp artifacts/benchmark-history/current-benchmark.json "artifacts/benchmark-history/nightly-${{ github.run_id }}.json"
          cp artifacts/gospider-soak.log "artifacts/scale-history/gospider-soak-${{ github.run_id }}.log"
          cp artifacts/stability-history/current-runtime-stability.json "artifacts/stability-history/runtime-stability-${{ github.run_id }}.json"

      - name: Generate public benchmark page
        shell: bash
        run: |
          python generate_public_benchmark_site.py --output web-ui/public-benchmarks/index.html

      - name: Upload nightly scale artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-scale-artifacts
          path: |
            artifacts/gospider-soak.log
            artifacts/benchmark-sla.json
            artifacts/benchmark-sla.md
            artifacts/blackbox-e2e.json
            artifacts/blackbox-e2e.md
            artifacts/runtime-stability.json
            artifacts/runtime-stability.md
            artifacts/runtime-stability-trends.json
            artifacts/runtime-stability-trends.md
            artifacts/superspider-control-plane.json
            artifacts/superspider-control-plane.md
            artifacts/benchmark-trends.json
            artifacts/benchmark-trends.md
            artifacts/benchmark-history/current-benchmark.json
            artifacts/benchmark-history/nightly-${{ github.run_id }}.json
            artifacts/scale-history/gospider-soak-${{ github.run_id }}.log
            artifacts/stability-history/current-runtime-stability.json
            artifacts/stability-history/runtime-stability-${{ github.run_id }}.json
            web-ui/public-benchmarks/index.html
