name: JavaSpider Live Captcha Smoke

on:
  workflow_dispatch:
    inputs:
      install_tesseract:
        description: Install Tesseract and run the local Tesseract smoke path when available
        required: false
        default: true
        type: boolean

jobs:
  live-captcha-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javaspider

    env:
      JAVASPIDER_LIVE_CAPTCHA_SMOKE: "1"
      DEATHBYCAPTCHA_USERNAME: ${{ secrets.DEATHBYCAPTCHA_USERNAME }}
      DEATHBYCAPTCHA_PASSWORD: ${{ secrets.DEATHBYCAPTCHA_PASSWORD }}
      JAVASPIDER_CUSTOM_CAPTCHA_URL: ${{ secrets.JAVASPIDER_CUSTOM_CAPTCHA_URL }}
      JAVASPIDER_CUSTOM_CAPTCHA_TOKEN: ${{ secrets.JAVASPIDER_CUSTOM_CAPTCHA_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Tesseract
        if: ${{ inputs.install_tesseract }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Show live captcha configuration summary
        shell: bash
        run: |
          echo "tesseract_on_path=$(command -v tesseract >/dev/null 2>&1 && echo yes || echo no)"
          echo "deathbycaptcha_username_set=$([ -n "${DEATHBYCAPTCHA_USERNAME}" ] && echo yes || echo no)"
          echo "deathbycaptcha_password_set=$([ -n "${DEATHBYCAPTCHA_PASSWORD}" ] && echo yes || echo no)"
          echo "custom_captcha_url_set=$([ -n "${JAVASPIDER_CUSTOM_CAPTCHA_URL}" ] && echo yes || echo no)"
          echo "custom_captcha_token_set=$([ -n "${JAVASPIDER_CUSTOM_CAPTCHA_TOKEN}" ] && echo yes || echo no)"

      - name: Run JavaSpider live captcha smoke
        shell: bash
        run: mvn -q "-Dtest=CaptchaSolverLiveSmokeTest" test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javaspider-live-captcha-surefire
          path: javaspider/target/surefire-reports/*
