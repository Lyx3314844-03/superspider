name: Framework Contract

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  contract:
    name: Verify Shared CLI Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyspider/requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: gospider/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install PySpider dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r pyspider/requirements.txt
          pip install -e "./pyspider[dev]"

      - name: Verify Go contract
        shell: bash
        run: |
          cd gospider
          go run ./cmd/gospider config init --output artifacts/go-contract.yaml
          go run ./cmd/gospider doctor --config artifacts/go-contract.yaml --json

      - name: Verify Java contract
        shell: bash
        run: |
          cd javaspider
          chmod +x run-framework.sh
          ./run-framework.sh config init --output artifacts/java-contract.yaml
          ./run-framework.sh doctor --config artifacts/java-contract.yaml --json

      - name: Verify Rust contract
        shell: bash
        run: |
          cd rustspider
          cargo run -- config init --output artifacts/rust-contract.yaml
          cargo run -- doctor --config artifacts/rust-contract.yaml --json

      - name: Verify Python contract
        shell: bash
        run: |
          pyspider config init --output pyspider/artifacts/py-contract.yaml
          pyspider doctor --config pyspider/artifacts/py-contract.yaml --json

      - name: Validate generated contract configs
        shell: bash
        run: |
          python validate_contract_configs.py --json \
            --config java=artifacts/java-contract.yaml \
            --config go=artifacts/go-contract.yaml \
            --config rust=artifacts/rust-contract.yaml \
            --config python=pyspider/artifacts/py-contract.yaml

      - name: Verify unified ultimate contract
        shell: bash
        run: |
          python verify_ultimate_contract.py --json
