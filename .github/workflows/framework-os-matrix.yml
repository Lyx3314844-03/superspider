name: Framework OS Matrix

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/framework-os-matrix.yml"
      - "verify_operating_system_support.py"
      - "verify_env.py"
      - "smoke_test.py"
      - "tests/test_verify_operating_system_support.py"
      - "tests/test_verify_env.py"
      - "tests/test_smoke_test.py"
      - "pyspider/run-framework.sh"
      - "pyspider/run-framework.bat"
      - "gospider/build.sh"
      - "gospider/build.bat"
      - "gospider/run-framework.sh"
      - "gospider/run-framework.bat"
      - "javaspider/build.sh"
      - "javaspider/build.bat"
      - "javaspider/run-framework.sh"
      - "javaspider/run-framework.bat"
      - "rustspider/build.sh"
      - "rustspider/build.bat"
      - "rustspider/run-framework.sh"
      - "rustspider/run-framework.bat"

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install PySpider dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r pyspider/requirements.txt
          pip install -e "./pyspider[dev]"

      - name: Prepare artifact directory
        shell: bash
        run: |
          mkdir -p artifacts

      - name: Run platform support tests
        shell: bash
        run: |
          python -m pytest tests/test_verify_operating_system_support.py tests/test_verify_env.py tests/test_smoke_test.py -q --no-cov

      - name: Verify operating system support
        shell: bash
        run: |
          python verify_operating_system_support.py --json --markdown-out artifacts/operating-system-support.md 2>&1 | tee artifacts/operating-system-support-${{ matrix.os }}.json

      - name: Run cross-platform doctor surface
        shell: bash
        run: |
          python verify_env.py --json

      - name: Run cross-platform smoke surface
        shell: bash
        run: |
          python smoke_test.py --json

      - name: Upload OS matrix reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: framework-os-matrix-${{ matrix.os }}
          path: |
            artifacts/operating-system-support-${{ matrix.os }}.json
            artifacts/operating-system-support.md
