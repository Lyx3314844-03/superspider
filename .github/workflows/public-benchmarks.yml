name: Public Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  benchmark-publish:
    name: Build Public Benchmark Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyspider/requirements.txt

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r pyspider/requirements.txt

      - name: Prepare artifacts directory
        shell: bash
        run: |
          mkdir -p artifacts
          mkdir -p artifacts/benchmark-history

      - name: Build runtime readiness report
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_readiness.py --json 2>&1 | tee artifacts/runtime-readiness.json

      - name: Build runtime stability report
        shell: bash
        run: |
          set -o pipefail
          python verify_runtime_stability.py --json --markdown-out artifacts/runtime-stability.md 2>&1 | tee artifacts/runtime-stability.json

      - name: Build ecosystem readiness report
        shell: bash
        run: |
          set -o pipefail
          python verify_ecosystem_readiness.py --json --markdown-out artifacts/ecosystem-readiness.md 2>&1 | tee artifacts/ecosystem-readiness.json

      - name: Build framework scorecard
        shell: bash
        run: |
          set -o pipefail
          python generate_framework_scorecard.py --json --markdown-out artifacts/framework-scorecard.md 2>&1 | tee artifacts/framework-scorecard.json

      - name: Build framework deep surfaces report
        shell: bash
        run: |
          set -o pipefail
          python generate_framework_deep_surfaces_report.py --json --markdown-out artifacts/framework-deep-surfaces.md 2>&1 | tee artifacts/framework-deep-surfaces.json

      - name: Build benchmark and SLA report
        shell: bash
        run: |
          set -o pipefail
          python verify_benchmark_sla.py --json --markdown-out artifacts/benchmark-sla.md 2>&1 | tee artifacts/benchmark-sla.json

      - name: Build blackbox e2e report
        shell: bash
        run: |
          set -o pipefail
          python verify_blackbox_e2e.py --json --markdown-out artifacts/blackbox-e2e.md 2>&1 | tee artifacts/blackbox-e2e.json

      - name: Build benchmark trend report
        shell: bash
        run: |
          set -o pipefail
          python verify_benchmark_trends.py \
            --json \
            --markdown-out artifacts/benchmark-trends.md \
            --snapshot-out artifacts/benchmark-history/current-benchmark.json \
            2>&1 | tee artifacts/benchmark-trends.json

      - name: Snapshot benchmark history with timestamp
        shell: bash
        run: |
          cp artifacts/benchmark-history/current-benchmark.json "artifacts/benchmark-history/benchmark-${{ github.run_id }}.json"

      - name: Generate static public benchmark site
        shell: bash
        run: |
          python generate_public_benchmark_site.py --output web-ui/public-benchmarks/index.html

      - name: Upload public benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-benchmark-artifacts
          path: |
            artifacts/runtime-readiness.json
            artifacts/runtime-stability.json
            artifacts/runtime-stability.md
            artifacts/ecosystem-readiness.json
            artifacts/ecosystem-readiness.md
            artifacts/framework-scorecard.json
            artifacts/framework-scorecard.md
            artifacts/framework-deep-surfaces.json
            artifacts/framework-deep-surfaces.md
            artifacts/benchmark-sla.json
            artifacts/benchmark-sla.md
            artifacts/blackbox-e2e.json
            artifacts/blackbox-e2e.md
            artifacts/benchmark-trends.json
            artifacts/benchmark-trends.md
            artifacts/benchmark-history/current-benchmark.json
            artifacts/benchmark-history/benchmark-${{ github.run_id }}.json
            web-ui/public-benchmarks/index.html
