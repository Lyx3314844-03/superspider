name: Adoption story
description: Share a public usage story, validation note, or case study
title: "[adoption] "
labels: ["adoption", "community"]
body:
  - type: input
    id: project
    attributes:
      label: Project or team
      description: Who is using the suite
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Which runtime(s) are used
      placeholder: java / go / python / rust / multi
    validations:
      required: true
  - type: textarea
    id: workload
    attributes:
      label: Workload
      description: What the crawler is used for
    validations:
      required: true
  - type: textarea
    id: scale
    attributes:
      label: Scale
      description: Requests/day, tasks/day, or qualitative scale if shareable
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence
      description: Link public benchmark artifacts, screenshots, repos, or docs
