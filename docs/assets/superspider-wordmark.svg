<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="SuperSpider Wordmark">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#0a2a1a"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f72585"/>
      <stop offset="16%"  stop-color="#e040fb"/>
      <stop offset="32%"  stop-color="#7c4dff"/>
      <stop offset="48%"  stop-color="#00b0ff"/>
      <stop offset="64%"  stop-color="#00e5ff"/>
      <stop offset="80%"  stop-color="#00e676"/>
      <stop offset="100%" stop-color="#ffea00"/>
    </linearGradient>
    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e040fb" stop-opacity="0.9"/>
      <stop offset="33%"  stop-color="#7c4dff" stop-opacity="0.9"/>
      <stop offset="66%"  stop-color="#00b0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="title-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="icon-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#e040fb" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="32" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#7c4dff" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
  </g>

  <!-- Left spider icon -->
  <g transform="translate(44, 60)" filter="url(#icon-glow)">
    <!-- Web rings -->
    <circle cx="80" cy="80" r="72" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0.3"/>
    <circle cx="80" cy="80" r="50" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0.3"/>
    <circle cx="80" cy="80" r="28" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0.3"/>
    <!-- Legs left -->
    <path d="M58 72 Q40 58 22 44" stroke="#e040fb" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M55 82 Q34 80 14 78" stroke="#e040fb" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M57 93 Q40 104 22 116" stroke="#e040fb" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Legs right -->
    <path d="M102 72 Q120 58 138 44" stroke="#00e5ff" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M105 82 Q126 80 146 78" stroke="#00e5ff" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M103 93 Q120 104 138 116" stroke="#00e5ff" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Silk thread -->
    <line x1="80" y1="0" x2="80" y2="42" stroke="#e040fb" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <!-- Abdomen -->
    <ellipse cx="80" cy="108" rx="22" ry="28" fill="url(#title-grad)"/>
    <!-- Head -->
    <circle cx="80" cy="72" r="22" fill="url(#title-grad)"/>
    <!-- Eyes -->
    <circle cx="73" cy="68" r="5" fill="white"/>
    <circle cx="87" cy="68" r="5" fill="white"/>
    <circle cx="73" cy="68" r="2.5" fill="#1a0533"/>
    <circle cx="87" cy="68" r="2.5" fill="#1a0533"/>
    <circle cx="74" cy="67" r="1.2" fill="white" opacity="0.9"/>
    <circle cx="88" cy="67" r="1.2" fill="white" opacity="0.9"/>
  </g>

  <!-- Main title: SuperSpider -->
  <text
    x="210" y="178"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="130"
    font-weight="900"
    letter-spacing="-3"
    fill="url(#title-grad)"
    filter="url(#title-glow)"
  >SuperSpider</text>

  <!-- Subtitle badge background -->
  <rect x="210" y="200" width="760" height="38" rx="8" fill="url(#badge-grad)" stroke="#7c4dff" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Subtitle: language tags -->
  <text x="226" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1" fill="url(#sub-grad)">🐍 pyspider</text>
  <text x="370" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" fill="#7c4dff" opacity="0.6">·</text>
  <text x="388" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1" fill="url(#sub-grad)">🐹 gospider</text>
  <text x="540" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" fill="#7c4dff" opacity="0.6">·</text>
  <text x="558" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1" fill="url(#sub-grad)">🦀 rustspider</text>
  <text x="730" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" fill="#7c4dff" opacity="0.6">·</text>
  <text x="748" y="225" font-family="'Segoe UI', monospace, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1" fill="url(#sub-grad)">☕ javaspider</text>

  <!-- Tagline -->
  <text x="210" y="268" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#7c4dff" opacity="0.7" letter-spacing="2">Multi-Language Web Crawler Framework  ·  AI · Media · Distributed · Anti-Bot</text>
</svg>
