<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="SuperSpider Wordmark">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f472b6"/>
      <stop offset="18%"  stop-color="#c084fc"/>
      <stop offset="36%"  stop-color="#818cf8"/>
      <stop offset="54%"  stop-color="#38bdf8"/>
      <stop offset="72%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="subgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a855f7" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" rx="40" fill="url(#bg)"/>

  <!-- Subtle web lines top-left -->
  <g stroke="#c084fc" stroke-width="1" opacity="0.08" fill="none">
    <circle cx="60" cy="60" r="80"/>
    <circle cx="60" cy="60" r="50"/>
    <line x1="60" y1="0" x2="60" y2="120"/>
    <line x1="0" y1="60" x2="120" y2="60"/>
    <line x1="17" y1="17" x2="103" y2="103"/>
    <line x1="103" y1="17" x2="17" y2="103"/>
  </g>

  <!-- Spider icon (small, left) -->
  <g transform="translate(52, 100)" filter="url(#glow)">
    <!-- Legs -->
    <g stroke="#c084fc" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M28 28 L10 14 L0 8"/>
      <path d="M26 36 L8 36 L0 32"/>
      <path d="M27 44 L10 52 L0 58"/>
      <path d="M52 28 L70 14 L80 8"/>
      <path d="M54 36 L72 36 L80 32"/>
      <path d="M53 44 L70 52 L80 58"/>
    </g>
    <!-- Body -->
    <ellipse cx="40" cy="52" rx="16" ry="20" fill="#a855f7"/>
    <!-- Head -->
    <circle cx="40" cy="30" r="14" fill="#a855f7"/>
    <!-- Eyes -->
    <circle cx="35" cy="27" r="4" fill="white"/>
    <circle cx="45" cy="27" r="4" fill="white"/>
    <circle cx="36" cy="28" r="2" fill="#1a0030"/>
    <circle cx="46" cy="28" r="2" fill="#1a0030"/>
    <!-- Thread -->
    <line x1="40" y1="0" x2="40" y2="16" stroke="#c084fc" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Main text: SuperSpider -->
  <text
    x="160" y="178"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="-4"
    fill="url(#textgrad)"
    filter="url(#glow)"
  >SuperSpider</text>

  <!-- Subtitle: four runtimes -->
  <text
    x="162" y="228"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="500"
    letter-spacing="3"
    fill="url(#subgrad)"
    opacity="0.85"
  >pyspider · gospider · rustspider · javaspider</text>
</svg>
