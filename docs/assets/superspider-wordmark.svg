<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="SuperSpider Wordmark">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="50%" stop-color="#11103a"/>
      <stop offset="100%" stop-color="#060618"/>
    </radialGradient>

    <!-- Main title gradient -->
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f472b6"/>
      <stop offset="14%"  stop-color="#e879f9"/>
      <stop offset="28%"  stop-color="#a855f7"/>
      <stop offset="42%"  stop-color="#818cf8"/>
      <stop offset="56%"  stop-color="#38bdf8"/>
      <stop offset="70%"  stop-color="#34d399"/>
      <stop offset="85%"  stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="sub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e879f9" stop-opacity="0.85"/>
      <stop offset="33%"  stop-color="#818cf8" stop-opacity="0.85"/>
      <stop offset="66%"  stop-color="#38bdf8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Badge fill -->
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Glow filter for title -->
    <filter id="title-glow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Spider icon glow -->
    <filter id="icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" rx="28" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="30" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="80" cy="15" r="1" fill="white" opacity="0.4"/>
  <circle cx="1240" cy="25" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1260" cy="80" r="1" fill="white" opacity="0.4"/>
  <circle cx="40" cy="290" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1250" cy="280" r="1" fill="white" opacity="0.5"/>

  <!-- Subtle web lines (top-left corner) -->
  <g stroke="#a855f7" stroke-width="0.5" opacity="0.1" fill="none">
    <circle cx="80" cy="80" r="60"/>
    <circle cx="80" cy="80" r="40"/>
    <circle cx="80" cy="80" r="20"/>
    <line x1="80" y1="20" x2="80" y2="140"/>
    <line x1="20" y1="80" x2="140" y2="80"/>
    <line x1="38" y1="38" x2="122" y2="122"/>
    <line x1="122" y1="38" x2="38" y2="122"/>
  </g>

  <!-- ===== SPIDER ICON (left) ===== -->
  <g transform="translate(36, 52)" filter="url(#icon-glow)">
    <!-- Legs left -->
    <path d="M56 68 Q38 54 20 40" stroke="#e879f9" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M52 82 Q30 80 10 78" stroke="#a855f7" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M54 96 Q36 108 18 122" stroke="#818cf8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M60 110 Q50 128 38 148" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Legs right -->
    <path d="M104 68 Q122 54 140 40" stroke="#e879f9" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M108 82 Q130 80 150 78" stroke="#a855f7" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M106 96 Q124 108 142 122" stroke="#818cf8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M100 110 Q110 128 122 148" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Silk thread -->
    <line x1="80" y1="0" x2="80" y2="40" stroke="#e879f9" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Abdomen -->
    <ellipse cx="80" cy="118" rx="24" ry="30">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="30;31;30" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="80" cy="118" rx="24" ry="30" fill="url(#title)"/>
    <!-- Head -->
    <circle cx="80" cy="76" r="26" fill="url(#title)"/>
    <!-- Eyes glow -->
    <circle cx="72" cy="72" r="9" fill="#e879f9" opacity="0.3"/>
    <circle cx="88" cy="72" r="9" fill="#e879f9" opacity="0.3"/>
    <!-- Eyes -->
    <circle cx="72" cy="72" r="7" fill="white"/>
    <circle cx="88" cy="72" r="7" fill="white"/>
    <circle cx="72" cy="72" r="4" fill="#1e0a3c"/>
    <circle cx="88" cy="72" r="4" fill="#1e0a3c"/>
    <circle cx="72" cy="72" r="2" fill="#e879f9"/>
    <circle cx="88" cy="72" r="2" fill="#e879f9"/>
    <circle cx="74" cy="70" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="90" cy="70" r="1.5" fill="white" opacity="0.9"/>
  </g>

  <!-- ===== MAIN TITLE ===== -->
  <text
    x="218" y="188"
    font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="148"
    font-weight="900"
    letter-spacing="-4"
    fill="url(#title)"
    filter="url(#title-glow)"
  >SuperSpider</text>

  <!-- ===== LANGUAGE BADGE ===== -->
  <rect x="218" y="208" width="820" height="44" rx="10" fill="url(#badge)" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- Language tags with emoji -->
  <text x="234" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="url(#sub)">🐍 Python</text>
  <text x="348" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a855f7" opacity="0.5">  ·  </text>
  <text x="374" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="url(#sub)">🐹 Go</text>
  <text x="440" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a855f7" opacity="0.5">  ·  </text>
  <text x="466" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="url(#sub)">🦀 Rust</text>
  <text x="556" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a855f7" opacity="0.5">  ·  </text>
  <text x="582" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="url(#sub)">☕ Java</text>
  <text x="672" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a855f7" opacity="0.5">  ·  </text>
  <text x="698" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="url(#sub)">🕷️ Web Crawler Framework</text>

  <!-- ===== TAGLINE ===== -->
  <text x="220" y="282" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#818cf8" opacity="0.75" letter-spacing="2.5">AI Extraction  ·  Media Download  ·  Anti-Bot  ·  Distributed  ·  Node-Reverse  ·  Browser Automation</text>
</svg>
