<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SuperSpider Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="web" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.7"/>
    </filter>
    <filter id="softglow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#c084fc" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Web rings (concentric arcs) -->
  <g fill="none" stroke="url(#web)" stroke-linecap="round" opacity="0.25">
    <circle cx="256" cy="256" r="180" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="130" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="80" stroke-width="1.5"/>
  </g>

  <!-- Web radial lines -->
  <g stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" opacity="0.2">
    <line x1="256" y1="76" x2="256" y2="436"/>
    <line x1="76" y1="256" x2="436" y2="256"/>
    <line x1="129" y1="129" x2="383" y2="383"/>
    <line x1="383" y1="129" x2="129" y2="383"/>
  </g>

  <!-- Spider legs - left side -->
  <g stroke="url(#web)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#softglow)">
    <!-- Upper left legs -->
    <path d="M210 220 L148 168 L96 148"/>
    <path d="M205 245 L136 240 L80 224"/>
    <path d="M208 272 L144 288 L88 308"/>
    <!-- Upper right legs -->
    <path d="M302 220 L364 168 L416 148"/>
    <path d="M307 245 L376 240 L432 224"/>
    <path d="M304 272 L368 288 L424 308"/>
  </g>

  <!-- Spider body (abdomen) -->
  <ellipse cx="256" cy="300" rx="58" ry="72" fill="url(#body)" filter="url(#glow)"/>

  <!-- Spider head -->
  <circle cx="256" cy="218" r="44" fill="url(#body)" filter="url(#glow)"/>

  <!-- Eyes -->
  <circle cx="240" cy="210" r="9" fill="#ffffff"/>
  <circle cx="272" cy="210" r="9" fill="#ffffff"/>
  <circle cx="242" cy="212" r="4" fill="#1a0030"/>
  <circle cx="274" cy="212" r="4" fill="#1a0030"/>
  <!-- Eye shine -->
  <circle cx="244" cy="209" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="276" cy="209" r="2" fill="#ffffff" opacity="0.8"/>

  <!-- Abdomen pattern -->
  <ellipse cx="256" cy="290" rx="22" ry="28" fill="#c084fc" opacity="0.35"/>
  <path d="M244 318 Q256 330 268 318" fill="none" stroke="#e9d5ff" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Fangs -->
  <path d="M244 258 Q238 272 242 280" fill="none" stroke="#e9d5ff" stroke-width="5" stroke-linecap="round"/>
  <path d="M268 258 Q274 272 270 280" fill="none" stroke="#e9d5ff" stroke-width="5" stroke-linecap="round"/>

  <!-- Silk thread from top -->
  <line x1="256" y1="76" x2="256" y2="174" stroke="#c084fc" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
