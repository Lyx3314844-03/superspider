<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SuperSpider Icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#0a2a1a"/>
    </linearGradient>
    <linearGradient id="spider-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="50%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="leg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c4dff" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#7c4dff" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Web rings -->
  <g fill="none" opacity="0.15">
    <circle cx="256" cy="256" r="200" stroke="url(#leg-grad)" stroke-width="1"/>
    <circle cx="256" cy="256" r="150" stroke="url(#leg-grad)" stroke-width="1"/>
    <circle cx="256" cy="256" r="100" stroke="url(#leg-grad)" stroke-width="1"/>
    <circle cx="256" cy="256" r="50" stroke="url(#leg-grad)" stroke-width="1"/>
  </g>

  <!-- Web radial lines -->
  <g stroke="#c084fc" stroke-width="1" opacity="0.12" fill="none">
    <line x1="256" y1="56" x2="256" y2="456"/>
    <line x1="56" y1="256" x2="456" y2="256"/>
    <line x1="114" y1="114" x2="398" y2="398"/>
    <line x1="398" y1="114" x2="114" y2="398"/>
    <line x1="56" y1="186" x2="456" y2="326"/>
    <line x1="186" y1="56" x2="326" y2="456"/>
  </g>

  <!-- Glow center -->
  <circle cx="256" cy="256" r="120" fill="url(#glow-center)"/>

  <!-- Spider legs - left -->
  <g stroke="url(#leg-grad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow-soft)">
    <path d="M210 230 Q170 200 130 170 Q110 155 90 140"/>
    <path d="M205 255 Q160 250 120 245 Q100 242 76 238"/>
    <path d="M208 278 Q168 290 132 308 Q112 318 88 332"/>
    <path d="M215 300 Q185 325 158 355 Q144 372 128 392"/>
  </g>

  <!-- Spider legs - right -->
  <g stroke="url(#leg-grad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#glow-soft)">
    <path d="M302 230 Q342 200 382 170 Q402 155 422 140"/>
    <path d="M307 255 Q352 250 392 245 Q412 242 436 238"/>
    <path d="M304 278 Q344 290 380 308 Q400 318 424 332"/>
    <path d="M297 300 Q327 325 354 355 Q368 372 384 392"/>
  </g>

  <!-- Spider silk thread from top -->
  <line x1="256" y1="56" x2="256" y2="168" stroke="#e040fb" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#glow-soft)"/>

  <!-- Spider abdomen (lower body) -->
  <ellipse cx="256" cy="310" rx="52" ry="64" fill="url(#spider-body)" filter="url(#shadow)"/>

  <!-- Abdomen pattern -->
  <ellipse cx="256" cy="300" rx="20" ry="26" fill="#ffffff" opacity="0.12"/>
  <path d="M244 330 Q256 345 268 330" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Spider head (cephalothorax) -->
  <circle cx="256" cy="228" r="46" fill="url(#spider-body)" filter="url(#shadow)"/>

  <!-- Head highlight -->
  <circle cx="244" cy="218" r="16" fill="#ffffff" opacity="0.08"/>

  <!-- Eyes - outer glow -->
  <circle cx="238" cy="222" r="13" fill="#ffffff" opacity="0.15"/>
  <circle cx="274" cy="222" r="13" fill="#ffffff" opacity="0.15"/>

  <!-- Eyes - main -->
  <circle cx="238" cy="222" r="10" fill="#ffffff"/>
  <circle cx="274" cy="222" r="10" fill="#ffffff"/>

  <!-- Eyes - iris -->
  <circle cx="238" cy="222" r="6" fill="#1a0533"/>
  <circle cx="274" cy="222" r="6" fill="#1a0533"/>

  <!-- Eyes - pupil glow -->
  <circle cx="238" cy="222" r="3" fill="#e040fb"/>
  <circle cx="274" cy="222" r="3" fill="#e040fb"/>

  <!-- Eyes - shine -->
  <circle cx="240" cy="219" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="276" cy="219" r="2" fill="#ffffff" opacity="0.9"/>

  <!-- Fangs -->
  <path d="M246 268 Q242 280 246 290" fill="none" stroke="#e040fb" stroke-width="4" stroke-linecap="round" filter="url(#glow-soft)"/>
  <path d="M266 268 Q270 280 266 290" fill="none" stroke="#e040fb" stroke-width="4" stroke-linecap="round" filter="url(#glow-soft)"/>

  <!-- Code brackets decoration -->
  <text x="68" y="290" font-family="monospace" font-size="28" fill="#00e5ff" opacity="0.35" font-weight="bold">&lt;/&gt;</text>
  <text x="390" y="290" font-family="monospace" font-size="28" fill="#e040fb" opacity="0.35" font-weight="bold">{}</text>
</svg>
