<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SuperSpider Icon</title>
  <desc id="desc">Blue SuperSpider icon with a premium rounded-square badge, network arcs, and a geometric spider mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="45%" stop-color="#c9e8ff"/>
      <stop offset="100%" stop-color="#6fb7ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="22%" r="85%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
