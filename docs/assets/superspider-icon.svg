<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SuperSpider Icon">
  <defs>
    <!-- Background gradient: deep space -->
    <radialGradient id="bg-radial" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="40%" stop-color="#11103a"/>
      <stop offset="100%" stop-color="#060618"/>
    </radialGradient>

    <!-- Spider body gradient -->
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6ef7"/>
      <stop offset="35%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Leg gradient -->
    <linearGradient id="leg-l" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="leg-r" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Web ring gradient -->
    <linearGradient id="web-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="body-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eye-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="leg-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outer-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Stars pattern -->
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg-radial)"/>

  <!-- Stars -->
  <circle cx="60" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="140" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="420" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="470" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="80" cy="400" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="450" cy="380" r="1" fill="white" opacity="0.6"/>
  <circle cx="380" cy="460" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="100" cy="460" r="1" fill="white" opacity="0.5"/>
  <circle cx="30" cy="200" r="1" fill="white" opacity="0.4"/>
  <circle cx="490" cy="250" r="1.5" fill="white" opacity="0.5"/>

  <!-- Web rings (concentric, subtle) -->
  <g fill="none">
    <circle cx="256" cy="256" r="210" stroke="url(#web-ring)" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="168" stroke="url(#web-ring)" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="126" stroke="url(#web-ring)" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="84" stroke="url(#web-ring)" stroke-width="0.8"/>
  </g>

  <!-- Web radial lines -->
  <g stroke="#a855f7" stroke-width="0.6" opacity="0.18" fill="none">
    <line x1="256" y1="46" x2="256" y2="466"/>
    <line x1="46" y1="256" x2="466" y2="256"/>
    <line x1="108" y1="108" x2="404" y2="404"/>
    <line x1="404" y1="108" x2="108" y2="404"/>
    <line x1="46" y1="176" x2="466" y2="336"/>
    <line x1="176" y1="46" x2="336" y2="466"/>
    <line x1="46" y1="336" x2="466" y2="176"/>
    <line x1="336" y1="46" x2="176" y2="466"/>
  </g>

  <!-- Outer glow halo -->
  <circle cx="256" cy="256" r="130" fill="#a855f7" opacity="0.06" filter="url(#outer-glow)"/>

  <!-- ===== SPIDER LEGS ===== -->
  <!-- Left legs (4) -->
  <g filter="url(#leg-glow)">
    <!-- L1: upper-upper -->
    <path d="M208 218 C185 200 162 182 132 162 C118 154 102 148 84 142" stroke="url(#leg-l)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <!-- L2: upper -->
    <path d="M203 244 C178 240 152 236 124 232 C108 230 90 228 70 226" stroke="url(#leg-l)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <!-- L3: lower -->
    <path d="M206 270 C182 278 158 290 132 306 C116 316 98 328 78 342" stroke="url(#leg-l)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <!-- L4: lower-lower -->
    <path d="M214 294 C198 316 180 340 160 366 C148 382 134 398 118 416" stroke="url(#leg-l)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Right legs (4) -->
  <g filter="url(#leg-glow)">
    <!-- R1 -->
    <path d="M304 218 C327 200 350 182 380 162 C394 154 410 148 428 142" stroke="url(#leg-r)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <!-- R2 -->
    <path d="M309 244 C334 240 360 236 388 232 C404 230 422 228 442 226" stroke="url(#leg-r)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <!-- R3 -->
    <path d="M306 270 C330 278 354 290 380 306 C396 316 414 328 434 342" stroke="url(#leg-r)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <!-- R4 -->
    <path d="M298 294 C314 316 332 340 352 366 C364 382 378 398 394 416" stroke="url(#leg-r)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Silk thread from top -->
  <line x1="256" y1="46" x2="256" y2="172" stroke="#e879f9" stroke-width="3" stroke-linecap="round" opacity="0.8" filter="url(#leg-glow)"/>

  <!-- ===== SPIDER BODY ===== -->
  <!-- Abdomen glow -->
  <ellipse cx="256" cy="318" rx="58" ry="70" fill="#a855f7" opacity="0.25" filter="url(#outer-glow)"/>

  <!-- Abdomen -->
  <ellipse cx="256" cy="318" rx="54" ry="66" fill="url(#body-grad)" filter="url(#body-glow)"/>

  <!-- Abdomen sheen -->
  <ellipse cx="244" cy="296" rx="22" ry="28" fill="white" opacity="0.08"/>

  <!-- Abdomen pattern lines -->
  <path d="M240 310 Q256 322 272 310" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M238 328 Q256 342 274 328" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.2"/>

  <!-- Head glow -->
  <circle cx="256" cy="228" r="52" fill="#a855f7" opacity="0.2" filter="url(#outer-glow)"/>

  <!-- Head (cephalothorax) -->
  <circle cx="256" cy="228" r="48" fill="url(#body-grad)" filter="url(#body-glow)"/>

  <!-- Head sheen -->
  <ellipse cx="244" cy="214" rx="20" ry="16" fill="white" opacity="0.1"/>

  <!-- ===== EYES ===== -->
  <!-- Eye glow halos -->
  <circle cx="236" cy="222" r="16" fill="#e879f9" opacity="0.2" filter="url(#eye-glow)"/>
  <circle cx="276" cy="222" r="16" fill="#e879f9" opacity="0.2" filter="url(#eye-glow)"/>

  <!-- Eye whites -->
  <circle cx="236" cy="222" r="12" fill="white"/>
  <circle cx="276" cy="222" r="12" fill="white"/>

  <!-- Eye iris (deep purple) -->
  <circle cx="236" cy="222" r="7.5" fill="#1e0a3c"/>
  <circle cx="276" cy="222" r="7.5" fill="#1e0a3c"/>

  <!-- Eye pupil glow -->
  <circle cx="236" cy="222" r="4" fill="#e879f9" filter="url(#eye-glow)"/>
  <circle cx="276" cy="222" r="4" fill="#e879f9" filter="url(#eye-glow)"/>

  <!-- Eye shine -->
  <circle cx="239" cy="218" r="2.5" fill="white" opacity="0.95"/>
  <circle cx="279" cy="218" r="2.5" fill="white" opacity="0.95"/>
  <circle cx="233" cy="225" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="273" cy="225" r="1.2" fill="white" opacity="0.5"/>

  <!-- ===== FANGS ===== -->
  <path d="M244 272 Q239 286 243 298" fill="none" stroke="#e879f9" stroke-width="4.5" stroke-linecap="round" filter="url(#leg-glow)"/>
  <path d="M268 272 Q273 286 269 298" fill="none" stroke="#e879f9" stroke-width="4.5" stroke-linecap="round" filter="url(#leg-glow)"/>

  <!-- ===== CODE DECORATION ===== -->
  <!-- Bottom-left: code tag -->
  <text x="52" y="448" font-family="'Courier New', monospace" font-size="26" fill="#22d3ee" opacity="0.4" font-weight="bold">&lt;/&gt;</text>
  <!-- Bottom-right: curly braces -->
  <text x="400" y="448" font-family="'Courier New', monospace" font-size="26" fill="#a855f7" opacity="0.4" font-weight="bold">{  }</text>

  <!-- Top-right: small dots (decorative) -->
  <circle cx="420" cy="88" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="434" cy="88" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="448" cy="88" r="3" fill="#e879f9" opacity="0.5"/>
</svg>
