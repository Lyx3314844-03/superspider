{{- if .Values.gospider.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superspider.fullname" . }}-gospider
  labels:
    {{- include "superspider.labels" . | nindent 4 }}
    app.kubernetes.io/component: gospider
spec:
  {{- if not .Values.gospider.autoscaling.enabled }}
  replicas: {{ .Values.gospider.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "superspider.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gospider
  template:
    metadata:
      labels:
        {{- include "superspider.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gospider
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: gospider
          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.gospider.image.repository }}:{{ .Values.gospider.image.tag }}"
          imagePullPolicy: {{ .Values.gospider.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- if .Values.monitoring.enabled }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gospider.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "superspider.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "superspider.fullname" . }}-gospider
  labels:
    {{- include "superspider.labels" . | nindent 4 }}
    app.kubernetes.io/component: gospider
spec:
  type: {{ .Values.gospider.service.type }}
  ports:
    - port: {{ .Values.gospider.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "superspider.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gospider
{{- end }}
