apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "superspider.fullname" . }}
  labels:
    {{- include "superspider.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "superspider.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.monitoring.prometheus.serviceMonitor.interval }}
      path: /metrics
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
