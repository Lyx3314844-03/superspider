# SuperSpider Helm Chart 默认配置

# 全局配置
global:
  imageRegistry: ""
  storageClass: ""

# GoSpider 配置
gospider:
  enabled: true
  replicaCount: 3
  image:
    repository: superspider/gospider
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    annotations: {}
    hosts:
      - host: gospider.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# JavaSpider 配置
javaspider:
  enabled: true
  replicaCount: 2
  image:
    repository: superspider/javaspider
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  service:
    type: ClusterIP
    port: 8081
  ingress:
    enabled: false

# PySpider 配置
pyspider:
  enabled: true
  replicaCount: 2
  image:
    repository: superspider/pyspider
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  service:
    type: ClusterIP
    port: 8082
  ingress:
    enabled: false

# RustSpider 配置
rustspider:
  enabled: true
  replicaCount: 3
  image:
    repository: superspider/rustspider
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "250m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  service:
    type: ClusterIP
    port: 8083
  ingress:
    enabled: false

# Redis 配置（分布式爬虫用）
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# 监控配置
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
  grafana:
    enabled: false
    dashboard:
      enabled: true

# 日志配置
logging:
  level: INFO
  format: json
  output: stdout

# 持久化存储
persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClass: ""

# 网络策略
networkPolicy:
  enabled: false
  allowExternal: true

# 安全配置
security:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# 节点选择
nodeSelector: {}

# 容忍度
tolerations: []

# 亲和性
affinity: {}
