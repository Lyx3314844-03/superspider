# Prometheus 监控规则

groups:
  - name: superspider
    interval: 30s
    rules:
      # 告警规则 - 高错误率
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "高错误率检测"
          description: "服务 {{ $labels.instance }} 错误率超过 10%"
      
      # 告警规则 - 高延迟
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "高延迟检测"
          description: "服务 {{ $labels.instance }} P95 延迟超过 1 秒"
      
      # 告警规则 - Pod 重启
      - alert: PodRestarting
        expr: kube_pod_container_status_restarts_total > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod 频繁重启"
          description: "Pod {{ $labels.pod }} 重启次数超过 3 次"
      
      # 告警规则 - 内存不足
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "容器 {{ $labels.container }} 内存使用率超过 90%"
      
      # 告警规则 - CPU 过高
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * 100000 > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "容器 {{ $labels.container }} CPU 使用率超过 90%"
      
      # 告警规则 - 下载失败率高
      - alert: HighDownloadFailureRate
        expr: rate(downloads_failed_total[5m]) / rate(downloads_total[5m]) > 0.2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "下载失败率过高"
          description: "爬虫下载失败率超过 20%"
      
      # 告警规则 - 队列积压
      - alert: QueueBacklog
        expr: queue_depth > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "任务队列积压"
          description: "任务队列深度超过 1000"
